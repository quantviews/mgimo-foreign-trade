name: Python Tests

on:
  push:
    branches: [ main ]
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/python-tests.yml"
  pull_request:
    paths:
      - "src/**/*.py"
      - "tests/**/*.py"
      - ".github/workflows/python-tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      MGIMO_DUCKDB_TMPDIR: /tmp/mgimo_foreign_trade_duckdb

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas numpy duckdb pyarrow beautifulsoup4

      - name: Run pytest
        run: pytest -q
