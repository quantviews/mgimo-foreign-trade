name: Quarto Publish

on:
  push:
    branches: [ main ]
    paths:
      - "site/**/*.qmd"
      - "site/**/*.R"
      - "site/styles/**/*.scss"
      - "site/styles/**/*.css"
      - "site/data/**"
      - "site/figures/**"
      - "other/**/*.qmd"
      - "lessons/**/*.qmd"
      - "lessons/**/*.css"
      - "_quarto.yml"
      - "site/_quarto.yml"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # нужно для пуша в gh-pages

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Quarto (pin version)
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.7.34"   # latest - не работает почему-то

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages for Quarto lessons
        run: python -m pip install nbformat jupyter ipykernel pandas matplotlib

      - name: Setup system libraries for showtext
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev libfreetype6-dev libpng-dev

      - name: Setup R dependencies (pak + cache)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::knitr
            any::rmarkdown
            any::tidyverse
            any::readr
            any::dplyr
            any::forcats
            any::arrow
            any::tibble
            any::highcharter
            any::duckdb
            any::forecast
            any::plotly
            any::ggbreak
            any::ggtext
            any::stringi
            any::showtext
            any::sysfonts
            any::jsonlite
            any::scales

      - name: Verify bulletin data snapshots
        run: |
          missing=0
          for f in bulletin_fo tab_stoim_oil df_groups data_oilgas hs4_labels; do
            if [ ! -f "site/data/${f}.parquet" ]; then
              echo "Missing site/data/${f}.parquet"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Run: Rscript site/bulletin_data_prep.R (requires db/unified_trade_data.duckdb)"
            exit 1
          fi

      - name: Show Quarto version (debug)
        run: quarto --version

      - name: Render site
        run: quarto render .

      - name: Publish _site to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
