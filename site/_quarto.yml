project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - technical.qmd
    - bulletin_comparison.qmd

website:
  title: "Национальная торговая статистика"
  navbar:
    logo: assets/mgimo-logo.svg
    logo-alt: "МГИМО"
    left:
      - text: "Главная"
        href: index.qmd
      - text: "Техническая документация"
        href: technical.qmd
      - text: "Месячный бюллетень"
        href: bulletin_comparison.qmd
      # Занятия рендерятся отдельным (корневым) проектом; в локальном превью
      # ссылаемся на опубликованные слайды, чтобы не требовать их сборки здесь.
      - text: "Занятия"
        menu:
          - text: "1. Введение в таможенную статистику"
            href: https://quantviews.github.io/mgimo-foreign-trade/lessons/lesson_01_intro.html
          - text: "2. Старая и новая статистика"
            href: https://quantviews.github.io/mgimo-foreign-trade/lessons/lesson_02_old_new_stats.html
          - text: "3. DuckDB и SQL"
            href: https://quantviews.github.io/mgimo-foreign-trade/lessons/lesson_03_duckdb.html
          - text: "4. Superset и дашборды"
            href: https://quantviews.github.io/mgimo-foreign-trade/lessons/lesson_04_superset.html

format:
  html:
    theme:
      - cosmo
      - styles/mgimo.scss
